<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Quiz App</title>
  <style>
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.25);
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --success-bg: #EAF3DE;
      --success-border: #3B6D11;
      --success-text: #27500A;
      --danger-bg: #FCEBEB;
      --danger-border: #A32D2D;
      --danger-text: #791F1F;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .quiz-wrap { width: 100%; max-width: 560px; }

    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 20px; font-weight: 500; }
    .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-right: 12px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--text);
      border-radius: 2px;
      transition: width 0.4s;
    }
    .progress-text { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .question-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .question-text { font-size: 16px; font-weight: 500; line-height: 1.5; }

    .options { display: flex; flex-direction: column; gap: 8px; }

    .option-btn {
      background: var(--surface);
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .option-btn:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--text);
    }
    .option-btn.correct {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }
    .option-btn.wrong {
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: var(--danger-text);
    }
    .option-btn:disabled { cursor: default; }

    .feedback {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
      min-height: 20px;
      padding: 0 2px;
      line-height: 1.6;
    }

    .next-btn {
      margin-top: 1rem;
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-md);
      background: var(--text);
      color: #ffffff;
      border: none;
      cursor: pointer;
      display: none;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .next-btn:hover { opacity: 0.85; }

    .score-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
    }
    .score-big { font-size: 52px; font-weight: 500; line-height: 1; margin-bottom: 8px; }
    .score-label { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
    .score-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .score-stat {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 10px;
    }
    .score-stat-val { font-size: 22px; font-weight: 500; }
    .score-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .restart-btn {
      padding: 10px 28px;
      font-size: 14px;
      border-radius: var(--radius-md);
      background: transparent;
      border: 0.5px solid var(--border-hover);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .restart-btn:hover { background: var(--bg); }
  </style>
</head>
<body>

<div class="quiz-wrap">
  <div class="header">
    <h1>CS Quiz</h1>
    <p>Δοκίμασε τις γνώσεις σου στο Computer Science</p>
  </div>

  <div id="quiz-view">
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <span class="progress-text" id="prog-text">1 / 7</span>
    </div>
    <div class="question-card">
      <div class="question-text" id="q-text"></div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Επόμενη ερώτηση</button>
  </div>

  <div id="score-view" style="display:none">
    <div class="score-card">
      <div class="score-big" id="score-big"></div>
      <div class="score-label" id="score-label"></div>
      <div class="score-stats">
        <div class="score-stat">
          <div class="score-stat-val" id="st-correct"></div>
          <div class="score-stat-lbl">Σωστές</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-val" id="st-wrong"></div>
          <div class="score-stat-lbl">Λάθος</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-val" id="st-pct"></div>
          <div class="score-stat-lbl">Ποσοστό</div>
        </div>
      </div>
      <button class="restart-btn" onclick="restart()">Παίξε ξανά</button>
    </div>
  </div>
</div>

<script>
  const questions = [
    {
      question: "Ποια από αυτές τις γλώσσες τρέχει απευθείας στον browser;",
      options: ["Java", "Python", "JavaScript", "C++"],
      correct: 2,
      explanation: "Η JavaScript είναι η μόνη γλώσσα που τρέχει natively στον browser."
    },
    {
      question: "Τι κάνει η εντολή 'git commit'?",
      options: ["Ανεβάζει κώδικα στο GitHub", "Αποθηκεύει αλλαγές στο τοπικό repo", "Κατεβάζει αλλαγές από το remote", "Δημιουργεί νέο branch"],
      correct: 1,
      explanation: "Το commit αποθηκεύει στιγμιότυπο των αλλαγών τοπικά. Το push τις ανεβάζει στο GitHub."
    },
    {
      question: "Τι σημαίνει OOP;",
      options: ["Open Operand Protocol", "Object-Oriented Programming", "Online Output Process", "Ordered Object Pattern"],
      correct: 1,
      explanation: "OOP = Object-Oriented Programming. Αντικειμενοστραφής προγραμματισμός — η βάση της Java."
    },
    {
      question: "Τι κάνει το localStorage στον browser;",
      options: ["Αποθηκεύει δεδομένα στον server", "Κρυπτογραφεί δεδομένα", "Αποθηκεύει δεδομένα τοπικά στον browser", "Φορτώνει αρχεία CSS"],
      correct: 2,
      explanation: "Το localStorage αποθηκεύει key-value δεδομένα στον browser του χρήστη. Παραμένουν ακόμα και αν κλείσεις το tab."
    },
    {
      question: "Τι επιστρέφει η JavaScript εντολή: typeof 42;",
      options: ['"integer"', '"number"', '"int"', '"float"'],
      correct: 1,
      explanation: "Στη JavaScript δεν υπάρχουν integers και floats — όλοι οι αριθμοί είναι τύπου 'number'."
    },
    {
      question: "Ποιο CSS property χρησιμοποιείς για να κεντράρεις στοιχεία οριζόντια με flexbox;",
      options: ["align-items", "justify-content", "text-align", "margin: auto"],
      correct: 1,
      explanation: "Με display:flex, το justify-content κεντράρει οριζόντια και το align-items κατακόρυφα."
    },
    {
      question: "Ποια δομή δεδομένων λειτουργεί με αρχή LIFO (Last In First Out);",
      options: ["Queue", "Array", "Stack", "LinkedList"],
      correct: 2,
      explanation: "Stack = στοίβα. Το τελευταίο που μπαίνει βγαίνει πρώτο — όπως μια στοίβα από πιάτα."
    }
  ];

  let current = 0;
  let score = 0;
  let answered = false;

  function render() {
    const q = questions[current];
    const pct = Math.round((current / questions.length) * 100);

    document.getElementById('prog').style.width = pct + '%';
    document.getElementById('prog-text').textContent = (current + 1) + ' / ' + questions.length;
    document.getElementById('q-text').textContent = q.question;
    document.getElementById('feedback').textContent = '';
    document.getElementById('next-btn').style.display = 'none';
    answered = false;

    const opts = document.getElementById('options');
    opts.innerHTML = '';

    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => answer(i);
      opts.appendChild(btn);
    });
  }

  function answer(idx) {
    if (answered) return;
    answered = true;

    const q = questions[current];
    const btns = document.querySelectorAll('.option-btn');

    btns.forEach(b => b.disabled = true);

    if (idx === q.correct) {
      btns[idx].classList.add('correct');
      document.getElementById('feedback').textContent = 'Σωστό! ' + q.explanation;
      score++;
    } else {
      btns[idx].classList.add('wrong');
      btns[q.correct].classList.add('correct');
      document.getElementById('feedback').textContent = 'Λάθος. ' + q.explanation;
    }

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = current < questions.length - 1 ? 'Επόμενη ερώτηση' : 'Δες αποτέλεσμα';
  }

  function nextQuestion() {
    current++;
    if (current < questions.length) {
      render();
    } else {
      showScore();
    }
  }

  function showScore() {
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('score-view').style.display = 'block';

    const wrong = questions.length - score;
    const pct = Math.round((score / questions.length) * 100);

    document.getElementById('score-big').textContent = score + '/' + questions.length;
    document.getElementById('score-label').textContent =
      pct >= 80 ? 'Εξαιρετικό αποτέλεσμα!' :
      pct >= 50 ? 'Καλή δουλειά, συνέχισε!' :
      'Μελέτησε λίγο ακόμα!';
    document.getElementById('st-correct').textContent = score;
    document.getElementById('st-wrong').textContent = wrong;
    document.getElementById('st-pct').textContent = pct + '%';
  }

  function restart() {
    current = 0;
    score = 0;
    document.getElementById('quiz-view').style.display = 'block';
    document.getElementById('score-view').style.display = 'none';
    render();
  }

  render();
</script>

</body>
</html>
