<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Quiz Pro</title>
<style>
:root{
--bg:#0f172a;--card:#111827;--accent:#3b82f6;--text:#f8fafc;--muted:#94a3b8;
--ok:#22c55e;--bad:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:24px}
.wrap{width:min(900px,100%)}
.card{background:rgba(17,24,39,.95);backdrop-filter:blur(10px);border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
h1{margin:0 0 8px}
.top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
.bar{height:10px;background:#334155;border-radius:999px;overflow:hidden;margin:16px 0}
.fill{height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);width:0%;transition:.4s}
.q{font-size:1.35rem;font-weight:700;margin:20px 0}
.grid{display:grid;gap:12px}
button.opt{padding:16px;border:none;border-radius:14px;background:#1f2937;color:white;text-align:left;cursor:pointer;font-size:1rem;transition:.2s}
button.opt:hover{transform:translateY(-2px)}
.correct{background:var(--ok)!important}
.wrong{background:var(--bad)!important}
#feedback{margin-top:16px;color:var(--muted)}
#next,#restart{margin-top:18px;padding:14px 22px;border:none;border-radius:12px;background:var(--accent);color:white;cursor:pointer}
.badges{display:flex;gap:12px;flex-wrap:wrap}
.badge{background:#1e293b;padding:10px 14px;border-radius:12px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<div class="top">
<div><h1>🚀 CS Quiz Pro</h1><div id="progressText"></div></div>
<div class="badges">
<div class="badge">🏆 Score: <span id="scoreLive">0</span></div>
<div class="badge">⚡ Streak: <span id="streak">0</span></div>
</div>
</div>
<div class="bar"><div id="fill" class="fill"></div></div>
<div id="quiz">
<div id="question" class="q"></div>
<div id="options" class="grid"></div>
<div id="feedback"></div>
<button id="next" class="hidden">Next</button>
</div>
<div id="results" class="hidden">
<h2>Quiz Complete!</h2>
<h1 id="final"></h1>
<p id="msg"></p>
<button id="restart">Play Again</button>
</div>
</div>
</div>
<script>
const questions=[
{q:"Which language runs natively in browsers?",o:["Java","Python","JavaScript","C++"],a:2,e:"JavaScript powers browser interactivity."},
{q:"What does Git commit do?",o:["Upload","Save snapshot","Pull","Branch"],a:1,e:"It saves a local snapshot."},
{q:"What is OOP?",o:["Protocol","Object-Oriented Programming","Process","Pattern"],a:1,e:"Programming with objects and classes."},
{q:"localStorage is used to...",o:["Server storage","Encrypt","Store locally","Load CSS"],a:2,e:"Persistent browser storage."},
{q:"typeof 42 returns?",o:["integer","number","int","float"],a:1,e:"All JS numbers are type number."}
];
let current=0,score=0,streak=0,answered=false;
function render(){
const q=questions[current];
progressText.textContent=`Question ${current+1}/${questions.length}`;
fill.style.width=((current/questions.length)*100)+"%";
question.textContent=q.q;
options.innerHTML='';feedback.textContent='';next.classList.add('hidden');answered=false;
q.o.forEach((t,i)=>{
const b=document.createElement('button');
b.className='opt';b.textContent=t;
b.onclick=()=>answer(i,b);
options.appendChild(b);
});
}
function answer(i,b){
if(answered)return; answered=true;
const q=questions[current];
[...options.children].forEach(x=>x.disabled=true);
if(i===q.a){score++;streak++;b.classList.add('correct');}
else{streak=0;b.classList.add('wrong');options.children[q.a].classList.add('correct');}
scoreLive.textContent=score; document.getElementById('streak').textContent=streak;
feedback.textContent=q.e;
next.classList.remove('hidden');
}
next.onclick=()=>{
current++;
if(current<questions.length) render();
else finish();
};
function finish(){
quiz.classList.add('hidden');results.classList.remove('hidden');
const pct=Math.round(score/questions.length*100);
final.textContent=`${score}/${questions.length} (${pct}%)`;
msg.textContent=pct>=80?"Excellent!":pct>=60?"Good job!":"Keep practicing!";
fill.style.width='100%';
}
restart.onclick=()=>location.reload();
render();
</script>
</body>
</html>
